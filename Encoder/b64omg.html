<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Image Converter | Pro Tool</title>
    <style>
        :root {
            --bg-body: #0b0f19;
            --bg-card: #151b2b;
            --border-color: #2a3447;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --success: #10b981;
            --warning-bg: #422006;
            --warning-text: #fde047;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 4px;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Drag & Drop Area */
        .upload-area {
            background-color: rgba(15, 23, 42, 0.6);
            border: 2px dashed #334155;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background-color: rgba(59, 130, 246, 0.08);
        }

        .upload-area.dragover {
            transform: scale(1.02);
        }

        .upload-icon {
            width: 32px;
            height: 32px;
            color: var(--text-muted);
            margin-bottom: 10px;
            transition: color 0.3s;
        }

        .upload-area:hover .upload-icon, .upload-area.dragover .upload-icon {
            color: var(--primary);
        }

        .upload-area span {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            display: block;
        }

        .upload-area input {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Preview Container & Expand Icon */
        .preview-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .preview-container {
            position: relative;
            width: 100%;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: none;
            cursor: zoom-in;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 280px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            transition: opacity 0.2s;
        }

        .preview-container:hover img {
            opacity: 0.85;
        }

        /* The Expand Icon on Top-Left */
        .expand-icon {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 28px;
            height: 28px;
            background: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            padding: 5px;
            border-radius: 6px;
            opacity: 0.4;
            transition: all 0.3s ease;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        .preview-container:hover .expand-icon {
            opacity: 1;
            transform: scale(1.1);
        }

        .info-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 6px;
            word-break: break-all;
            text-align: center;
        }

        .quality-section {
            background-color: rgba(15, 23, 42, 0.4);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .section-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: block;
            font-weight: 500;
        }

        .quality-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 8px;
        }

        .quality-btn {
            background-color: #1e293b;
            color: var(--text-main);
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .quality-btn:hover {
            background-color: #334155;
        }

        .quality-btn.active {
            background-color: rgba(59, 130, 246, 0.1);
            border-color: var(--primary);
            color: #60a5fa;
            box-shadow: inset 0 0 0 1px var(--primary);
        }

        /* Buttons & Inputs */
        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:hover { background-color: var(--primary-hover); }

        .btn.secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn.secondary:hover {
            background-color: #1e293b;
            border-color: #475569;
        }

        .btn.success {
            background-color: var(--success);
        }

        textarea {
            width: 100%;
            height: 160px;
            background-color: #0b0f19;
            border: 1px solid var(--border-color);
            color: #a7f3d0;
            padding: 16px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            resize: vertical;
            font-size: 0.85rem;
            line-height: 1.5;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        textarea::placeholder { color: #475569; }

        .warning-badge {
            background-color: var(--warning-bg);
            color: var(--warning-text);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            border: 1px solid #713f12;
        }

        /* SVG Icons */
        svg {
            width: 18px;
            height: 18px;
        }

        /* Toast Notification */
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #1e293b;
            color: #ffffff;
            text-align: center;
            padding: 14px 24px;
            border-radius: 8px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 1000;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Fullscreen Image Modal (Lightbox) */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 95vw;
            max-height: 95vh;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            object-fit: contain;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
            z-index: 10000;
        }

        .close-modal:hover { color: var(--danger); }

        /* Chunk Copy Section */
        .chunk-section {
            background-color: rgba(15, 23, 42, 0.4);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .chunk-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .chunk-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .chunk-select {
            background-color: #1e293b;
            color: var(--text-main);
            border: 1px solid #334155;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .chunk-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 8px 12px;
            border-radius: 6px;
            flex: 1;
            text-align: center;
        }

        .chunk-actions {
            display: flex;
            gap: 8px;
        }

        .chunk-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chunk-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .chunk-btn.secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .chunk-btn.secondary:hover {
            background-color: #1e293b;
        }

        .chunk-progress {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Encoder Section -->
    <div class="card">
        <div class="card-header">
            <h2>
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Image to Base64
            </h2>
        </div>
        
        <div class="upload-area" id="uploadArea">
            <svg class="upload-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <span>Drag & drop an image or click to browse</span>
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <!-- Preview & Info -->
        <div class="preview-box">
            <div class="preview-container" id="encoderPreviewContainer" onclick="openModal(document.getElementById('preview').src)">
                <svg class="expand-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
                </svg>
                <img id="preview" alt="Selected Image Preview">
            </div>
            <div class="info-text" id="imageInfo" style="display: none;"></div>
        </div>

        <!-- Quality Options -->
        <div id="qualitySection" class="quality-section" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <span class="section-label" style="margin-bottom: 0;">Select Output Quality:</span>
                <span id="originalSizeWarning" class="warning-badge" style="display: none;">High Memory Usage</span>
            </div>
            <div class="quality-options" id="qualityOptions"></div>
        </div>

        <textarea id="base64Output" placeholder="Base64 output will appear here..." readonly></textarea>

        <!-- Chunk Copy Section (initially hidden) -->
        <div class="chunk-section" id="chunkSection">
            <div class="chunk-row">
                <span class="chunk-label">Chunk size:</span>
                <select id="chunkSizeSelect" class="chunk-select">
                    <option value="1000">1k (1000 chars)</option>
                    <option value="2500" selected>2.5k (2500 chars)</option>
                    <option value="5000">5k (5000 chars)</option>
                    <option value="10000">10k (10000 chars)</option>
                </select>
                <div class="chunk-info" id="chunkInfo">No chunks yet</div>
            </div>
            <div class="chunk-row">
                <div class="chunk-actions">
                    <button class="chunk-btn" id="copyChunkBtn" onclick="copyNextChunk()">
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Copy Next Chunk
                    </button>
                    <button class="chunk-btn secondary" id="resetChunksBtn" onclick="resetChunks()">
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Reset
                    </button>
                </div>
                <span class="chunk-progress" id="chunkProgress"></span>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn" id="copyBtn" onclick="copyBase64()">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                Copy Base64
            </button>
            <button class="btn secondary" onclick="clearEncoder()">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                Clear
            </button>
        </div>
    </div>

    <!-- Decoder Section -->
    <div class="card">
        <div class="card-header">
            <h2>
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                Base64 to Image
            </h2>
        </div>
        
        <textarea id="base64Input" placeholder="Paste your Base64 string here..."></textarea>
        
        <div class="btn-group">
            <button class="btn secondary" onclick="pasteFromClipboard()">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                Paste
            </button>
            <button class="btn" onclick="generateImage()">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                Render
            </button>
            <button class="btn secondary" onclick="clearDecoder()">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div class="preview-box">
            <div class="preview-container" id="decoderPreviewContainer" onclick="openModal(document.getElementById('decodedImage').src)">
                <svg class="expand-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
                </svg>
                <img id="decodedImage" alt="Decoded Image Result">
            </div>
            
            <button id="downloadBtn" class="btn secondary" style="display: none; width: 100%; margin-top: 5px;" onclick="downloadImage()">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Download Image
            </button>
        </div>
    </div>
</div>

<!-- Fullscreen Modal (Lightbox) -->
<div id="imageModal" class="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="fullScreenImg">
</div>

<!-- Toast Notification -->
<div class="toast" id="toast">Message</div>

<script>
    // ---------- Configuration ----------
    const qualityPresets = [
    { key: 'ultraLow', label: 'Ultra Low (144p)', maxHeight: 144 },
    { key: 'low', label: 'Low (240p)', maxHeight: 240 },
    { key: 'balanced', label: 'Balanced (360p)', maxHeight: 360 },
    { key: 'standard', label: 'SD (480p)', maxHeight: 480 },
    { key: 'high', label: 'HD (720p)', maxHeight: 720 },
    { key: 'fullHD', label: 'Full HD (1080p)', maxHeight: 1080 },
    { key: 'quadHD', label: '2K (1440p)', maxHeight: 1440 },
    { key: 'ultraHD', label: '4K (2160p)', maxHeight: 2160 },
    { key: 'original', label: 'Original', maxHeight: Infinity }
];


    let originalImageFile = null;
    let previewUrl = null;

    // Chunk copy variables
    let fullBase64String = '';
    let chunkStart = 0;
    let currentChunkSize = 2500; // default from select

    // ---------- Helper: Format File Size ----------
    function formatBytes(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // ---------- Drag & Drop Logic ----------
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        uploadArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

    ['dragenter', 'dragover'].forEach(eventName => {
        uploadArea.addEventListener(eventName, () => uploadArea.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        uploadArea.addEventListener(eventName, () => uploadArea.classList.remove('dragover'), false);
    });

    uploadArea.addEventListener('drop', (e) => {
        let dt = e.dataTransfer;
        let files = dt.files;
        if(files.length) {
            imageInput.files = files;
            handleFileSelect(files[0]);
        }
    });

    imageInput.addEventListener('change', function(e) {
        if (e.target.files[0]) handleFileSelect(e.target.files[0]);
    });

    // ---------- Modal / Lightbox Logic ----------
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("fullScreenImg");

    function openModal(src) {
        if (!src) return;
        modal.classList.add("show");
        modalImg.src = src;
        document.body.style.overflow = "hidden"; 
    }

    function closeModal() {
        modal.classList.remove("show");
        setTimeout(() => { modalImg.src = ""; }, 300); 
        document.body.style.overflow = "auto";
    }

    modal.addEventListener('click', function(e) { if (e.target !== modalImg) closeModal(); });
    document.addEventListener('keydown', function(e) { if (e.key === "Escape" && modal.classList.contains("show")) closeModal(); });

    // ---------- Toast ----------
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerHTML = isError ? 
            `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${msg}` : 
            `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> ${msg}`;
        toast.style.borderColor = isError ? 'var(--danger)' : 'var(--success)';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ---------- ENCODER Logic ----------
    function handleFileSelect(file) {
        if (!file.type.startsWith('image/')) {
            showToast('Please select a valid image file', true);
            return;
        }

        originalImageFile = file;
        if (previewUrl) URL.revokeObjectURL(previewUrl);
        
        previewUrl = URL.createObjectURL(file);
        const previewImg = document.getElementById('preview');
        const container = document.getElementById('encoderPreviewContainer');
        const infoText = document.getElementById('imageInfo');
        
        previewImg.src = previewUrl;
        container.style.display = 'block';
        infoText.style.display = 'block';
        
        const tempImg = new Image();
        tempImg.onload = function() {
            infoText.innerHTML = `<strong>${file.name}</strong><br>Res: ${tempImg.width}x${tempImg.height}px &nbsp;|&nbsp; Size: ${formatBytes(file.size)}`;
            generateQualityOptions(tempImg.height, file.size);
            document.getElementById('base64Output').value = '';
        };
        tempImg.src = previewUrl;
    }

    function generateQualityOptions(imageHeight, fileSize) {
        const section = document.getElementById('qualitySection');
        const optionsDiv = document.getElementById('qualityOptions');
        const warningSpan = document.getElementById('originalSizeWarning');
        
        optionsDiv.innerHTML = '';
        const applicableQualities = qualityPresets.filter(preset => preset.key === 'original' || imageHeight > preset.maxHeight);

        warningSpan.style.display = (fileSize > 1.5 * 1024 * 1024) ? 'inline-block' : 'none';

        applicableQualities.forEach(preset => {
            const btn = document.createElement('button');
            btn.className = 'quality-btn';
            btn.textContent = preset.label;
            
            btn.onclick = () => {
                document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                generateBase64ForQuality(originalImageFile, preset.maxHeight);
            };
            optionsDiv.appendChild(btn);
        });
        section.style.display = 'block';
    }

    // Adaptive quality based on filesize
    function getAdaptiveQuality(fileSizeBytes) {
        const kb = 1024;
        const mb = 1024 * kb;
        if (!fileSizeBytes) return 0.85;
        if (fileSizeBytes > 4 * mb) return 0.65;
        if (fileSizeBytes > 2 * mb) return 0.75;
        if (fileSizeBytes > 800 * kb) return 0.80;
        return 0.90;
    }

    // Produce WebP base64
    async function generateBase64ForQuality(file, maxHeight) {
        if (!file) return;
        
        try {
            const img = new Image();
            const imageUrl = URL.createObjectURL(file);
            
            img.onload = function() {
                try {
                    let width = img.width; let height = img.height;
                    if (maxHeight !== Infinity && height > maxHeight) {
                        width = Math.round(width * (maxHeight / height));
                        height = maxHeight;
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');

                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);

                    const quality = getAdaptiveQuality(file.size);
                    const base64 = canvas.toDataURL('image/webp', quality);
                    document.getElementById('base64Output').value = base64;

                    // Store full string for chunk copy
                    fullBase64String = base64;
                    resetChunks(); // resets chunkStart and updates UI
                    showChunkSectionIfNeeded();

                    showToast(`Compressed to ${width}x${height}px (WebP)`, false);
                } catch (err) {
                    // fallback
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const result = e.target.result;
                        document.getElementById('base64Output').value = result;
                        fullBase64String = result;
                        resetChunks();
                        showChunkSectionIfNeeded();
                        showToast('Base64 generated (fallback)', false);
                    };
                    reader.readAsDataURL(file);
                } finally {
                    URL.revokeObjectURL(imageUrl);
                }
            };
            img.onerror = function() {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const result = e.target.result;
                    document.getElementById('base64Output').value = result;
                    fullBase64String = result;
                    resetChunks();
                    showChunkSectionIfNeeded();
                    showToast('Base64 generated (fallback)', false);
                };
                reader.readAsDataURL(file);
                URL.revokeObjectURL(imageUrl);
            };
            img.src = imageUrl;
        } catch (err) {
            showToast('Failed to generate Base64', true);
        }
    }

    function showChunkSectionIfNeeded() {
        const section = document.getElementById('chunkSection');
        if (fullBase64String.length > 1000) {
            section.style.display = 'flex';
            updateChunkUI();
        } else {
            section.style.display = 'none';
        }
    }

    // Chunk copy functions
    function updateChunkUI() {
        const chunkInfo = document.getElementById('chunkInfo');
        const chunkProgress = document.getElementById('chunkProgress');
        const copyBtn = document.getElementById('copyChunkBtn');
        const total = fullBase64String.length;
        const chunkSize = parseInt(document.getElementById('chunkSizeSelect').value, 10);
        const start = chunkStart;
        const end = Math.min(start + chunkSize, total);
        const currentChunk = Math.floor(start / chunkSize) + 1;
        const totalChunks = Math.ceil(total / chunkSize);

        chunkInfo.textContent = `Chars ${start}–${end} of ${total}`;
        chunkProgress.textContent = `Chunk ${currentChunk} / ${totalChunks}`;

        if (start >= total) {
            copyBtn.disabled = true;
            chunkProgress.textContent += ' (completed)';
        } else {
            copyBtn.disabled = false;
        }
    }

    function copyNextChunk() {
        if (!fullBase64String) return;
        const total = fullBase64String.length;
        const chunkSize = parseInt(document.getElementById('chunkSizeSelect').value, 10);
        const start = chunkStart;
        const end = Math.min(start + chunkSize, total);
        if (start >= total) {
            showToast('All chunks have been copied', true);
            return;
        }

        const chunk = fullBase64String.substring(start, end);
        navigator.clipboard.writeText(chunk).then(() => {
            showToast(`Copied chars ${start}–${end}`, false);
            chunkStart = end;
            updateChunkUI();
        }).catch(() => {
            // fallback
            const textarea = document.createElement('textarea');
            textarea.value = chunk;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast(`Copied chars ${start}–${end} (fallback)`, false);
            chunkStart = end;
            updateChunkUI();
        });
    }

    function resetChunks() {
        chunkStart = 0;
        currentChunkSize = parseInt(document.getElementById('chunkSizeSelect').value, 10);
        updateChunkUI();
    }

    // Listen to chunk size change
    document.getElementById('chunkSizeSelect').addEventListener('change', function() {
        resetChunks();
    });

    async function copyBase64() {
        const output = document.getElementById('base64Output').value;
        const copyBtn = document.getElementById('copyBtn');
        
        if (!output) {
            showToast('Please generate Base64 first.', true);
            return;
        }
        
        try {
            await navigator.clipboard.writeText(output);
            showToast('Copied to clipboard!', false);
            
            // Smart Button Feedback
            const originalHTML = copyBtn.innerHTML;
            copyBtn.classList.add('success');
            copyBtn.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Copied!`;
            
            setTimeout(() => {
                copyBtn.classList.remove('success');
                copyBtn.innerHTML = originalHTML;
            }, 2000);

        } catch {
            document.getElementById('base64Output').select();
            document.execCommand('copy');
            showToast('Copied to clipboard!', false);
        }
    }

    function clearEncoder() {
        document.getElementById('imageInput').value = '';
        document.getElementById('encoderPreviewContainer').style.display = 'none';
        document.getElementById('preview').src = '';
        document.getElementById('imageInfo').style.display = 'none';
        document.getElementById('base64Output').value = '';
        document.getElementById('qualitySection').style.display = 'none';
        document.getElementById('chunkSection').style.display = 'none';
        
        if (previewUrl) { URL.revokeObjectURL(previewUrl); previewUrl = null; }
        originalImageFile = null;
        fullBase64String = '';
        chunkStart = 0;
    }

    // ---------- DECODER Logic ----------
    async function pasteFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('base64Input').value = text;
            showToast('Pasted from clipboard', false);
        } catch {
            showToast('Clipboard access denied. Please paste manually.', true);
        }
    }

    function generateImage() {
        let base64 = document.getElementById('base64Input').value.trim();
        const imgElement = document.getElementById('decodedImage');
        const container = document.getElementById('decoderPreviewContainer');
        const dlBtn = document.getElementById('downloadBtn');
        
        if (!base64) { showToast('Please input a Base64 string', true); return; }

        try {
            const base64Data = base64.includes(',') ? base64.split(',')[1] : base64;
            const mimeType = base64.includes('data:') ? base64.match(/data:([^;]+)/)[1] : 'image/webp';
            
            const byteCharacters = atob(base64Data);
            const byteArrays =[];
            for (let offset = 0; offset < byteCharacters.length; offset += 512) {
                const slice = byteCharacters.slice(offset, offset + 512);
                const byteNumbers = new Array(slice.length);
                for (let i = 0; i < slice.length; i++) byteNumbers[i] = slice.charCodeAt(i);
                byteArrays.push(new Uint8Array(byteNumbers));
            }
            
            const blob = new Blob(byteArrays, { type: mimeType });
            const url = URL.createObjectURL(blob);
            
            imgElement.src = url;
            container.style.display = 'block';
            dlBtn.style.display = 'flex';
            
            imgElement.onload = () => {
                showToast('Image rendered perfectly', false);
                if (imgElement.dataset.lastUrl) URL.revokeObjectURL(imgElement.dataset.lastUrl);
                imgElement.dataset.lastUrl = url;
            };
            
            imgElement.onerror = () => {
                showToast('Invalid Base64 format', true);
                container.style.display = 'none';
                dlBtn.style.display = 'none';
            };
            
        } catch (err) {
            showToast('Failed to decode image', true);
            container.style.display = 'none';
            dlBtn.style.display = 'none';
        }
    }

    function downloadImage() {
        const imgElement = document.getElementById('decodedImage');
        if (!imgElement.src) return;

        const temp = new Image();
        temp.crossOrigin = 'anonymous';
        temp.onload = function() {
            try {
                const w = temp.naturalWidth || temp.width;
                const h = temp.naturalHeight || temp.height;
                const canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(temp, 0, 0, w, h);
                canvas.toBlob(function(blob) {
                    if (!blob) { showToast('Conversion failed', true); return; }
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `decoded_image_${Date.now()}.jpg`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 'image/jpeg', 0.92);
            } catch (err) {
                showToast('Download failed', true);
            }
        };
        temp.onerror = function() {
            showToast('Download failed', true);
        };
        temp.src = imgElement.src;
    }

    function clearDecoder() {
        document.getElementById('base64Input').value = '';
        document.getElementById('decoderPreviewContainer').style.display = 'none';
        document.getElementById('downloadBtn').style.display = 'none';
        document.getElementById('decodedImage').src = '';
        if (document.getElementById('decodedImage').dataset.lastUrl) {
            URL.revokeObjectURL(document.getElementById('decodedImage').dataset.lastUrl);
        }
    }
</script>
