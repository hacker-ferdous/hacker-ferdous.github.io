<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tspott lite</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            cursor: pointer;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* স্ক্রিনে একটা বড় প্লে আইকন দেখাবে যাতে বুঝতে পারিস ক্লিক করতে হবে */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.6);
            z-index: 10;
            transition: opacity 0.3s ease;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <div id="overlay" class="overlay">রিমোটের বাটন বা স্ক্রিনে ক্লিক কর প্লে করার জন্য</div>
    <video id="video" playsinline loop></video>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const streamUrl = 'https://bdixserver.tvhunter.top/ant1009/tracks-v1a1/mono.m3u8';
        let hls;
        let isInitialized = false;
        
        function startStreaming() {
            if (isInitialized) return;
            isInitialized = true;

            // ক্লিক করার সাথে সাথে ওভারলে হাওয়া করে দাও
            overlay.style.opacity = 0;
            setTimeout(() => overlay.remove(), 300);

            // ফুল স্ক্রিন রিকোয়েস্ট
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
            else if (video.mozRequestFullScreen) video.mozRequestFullScreen();
            else if (video.msRequestFullscreen) video.msRequestFullscreen();

            // এবার প্লেয়ার ইনিশিয়ালাইজ হবে, তার আগে এক ফোঁটা ডেটাও খাবে না
            if (Hls.isSupported()) {
                hls = new Hls({
                    maxBufferLength: 8,
                    maxMaxBufferLength: 15,
                    enableWorker: true,
                    lowLatencyMode: true
                });
                
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.muted = false;
                    video.play().catch(e => console.log("Play blocked:", e));
                });

                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                break;
                        }
                    }
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.muted = false;
                video.play().catch(e => console.log("Play blocked:", e));
            }
        }

        // ইউজার ক্লিক করলেই কেবল স্ট্রিম চালু হবে এবং ফুল স্ক্রিন হবে
        document.addEventListener('click', startStreaming);
        document.addEventListener('keydown', startStreaming);

        // এন্টি-স্টাক মেকানিজম (ভিডিও চলন্ত অবস্থায় আটকে গেলে রিকভার করবে, পজ থাকলে ডিস্টার্ব করবে না)
        setInterval(() => {
            if (isInitialized && video.paused && !video.ended) {
                // যদি প্লে করার পর কোনো এররে আটকে যায়, তবেই পুশ করবে
                video.play().catch(() => {});
            }
        }, 5000);
    </script>
</body>
</html>
