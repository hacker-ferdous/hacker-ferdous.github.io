<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsports</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            cursor: pointer; /* স্ক্রিনে হাত দিলেই যেন কাজ করে */
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <!-- controls বাদ দিয়েছি যাতে টিভির স্ক্রিনে ফালতু মেনু ভেসে না থাকে, একদম ক্লিন ফুল স্ক্রিন -->
    <video id="video" autoplay playsinline muted loop></video>

    <script>
        const video = document.getElementById('video');
        const streamUrl = 'https://bdixserver.tvhunter.top/ant1009/tracks-v1a1/mono.m3u8';
        let hls;
        
        function initPlayer() {
            if (Hls.isSupported()) {
                hls = new Hls({
                    maxBufferLength: 8,       // র‍্যামের প্রেশার আরও কমানো হলো
                    maxMaxBufferLength: 15,
                    enableWorker: true,
                    lowLatencyMode: true
                });
                
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    forceAutoplay();
                });

                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                setTimeout(() => { initPlayer(); }, 2000);
                                break;
                        }
                    }
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', forceAutoplay);
            }
        }

        // এগ্রেসিভ অটো-প্লে মেকানিজম
        function forceAutoplay() {
            video.muted = true; // ব্রাউজারকে ধোঁকা দেওয়ার জন্য প্রথমে মিউট
            let playPromise = video.play();
            
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    console.log("Autoplay started successfully!");
                }).catch(error => {
                    console.log("Autoplay blocked, waiting for user interaction...");
                    // যদি ব্রাউজার আটকে দেয়, তবে ১ সেকেন্ড পর পর জোর জবরদস্তি করতে থাকবে
                    let retry = setInterval(() => {
                        video.play().then(() => clearInterval(retry)).catch(() => {});
                    }, 1000);
                });
            }
        }

        // ফুল স্ক্রিন এবং সাউন্ড অন করার ম্যাজিক (ইউজারের যেকোনো ক্লিকে)
        function triggerFullScreenAndSound() {
            // সাউন্ড আনমিউট কর
            video.muted = false;
            
            // ফুল স্ক্রিন রিকোয়েস্ট (সব ধরনের ব্রাউজারের জন্য)
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.mozRequestFullScreen) { /* Firefox */
                video.mozRequestFullScreen();
            } else if (video.webkitRequestFullscreen) { /* Chrome, Safari and Opera */
                video.webkitRequestFullscreen();
            } else if (video.msRequestFullscreen) { /* IE/Edge */
                video.msRequestFullscreen();
            }
            
            // একবার ফুল স্ক্রিন হয়ে গেলে এই লিসেনার রিমুভ করে দাও
            document.removeEventListener('click', triggerFullScreenAndSound);
            document.removeEventListener('keydown', triggerFullScreenAndSound);
        }

        // স্ক্রিনে ক্লিক করলে বা রিমোটের যেকোনো বাটন চাপলেই ফুল স্ক্রিন + সাউন্ড চালু হবে
        document.addEventListener('click', triggerFullScreenAndSound);
        document.addEventListener('keydown', triggerFullScreenAndSound);

        // প্লেয়ার চালু কর
        initPlayer();

        // এন্টি-স্টাক মেকানিজম (ভিডিও যাতে কোনোভাবেই পজ হয়ে না থাকে)
        setInterval(() => {
            if (video.paused) {
                video.play().catch(() => {});
            }
        }, 3000);
    </script>
</body>
</html>
