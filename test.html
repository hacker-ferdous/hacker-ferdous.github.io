<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Lightweight IPTV Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* টিভির স্ক্রিন সাইজ অনুযায়ী ফিট হবে */
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <video id="video" autoplay controls playsinline muted></video>

    <script>
        const video = document.getElementById('video');
        const streamUrl = 'https://bdixserver.tvhunter.top/ant1009/tracks-v1a1/mono.m3u8';
        
        function initPlayer() {
            if (Hls.isSupported()) {
                const hls = new Hls({
                    maxBufferLength: 10,     // বাফার সাইজ কম রাখা হয়েছে যাতে টিভির র‍্যাম জ্যাম না হয়
                    maxMaxBufferLength: 20,
                    enableWorker: true,      // ব্যাকগ্রাউন্ড থ্রেড ব্যবহার করবে পারফরম্যান্সের জন্য
                    lowLatencyMode: true     // ল্যাগ কমাবে
                });
                
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
                // যদি কোনো কারণে স্ট্রিম এরর খায় বা আটকে যায়, অটো-রিকভারি করবে
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.log("Network error, trying to recover...");
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.log("Media error, trying to recover...");
                                hls.recoverMediaError();
                                break;
                            default:
                                console.log("Unrecoverable error, reloading player...");
                                setTimeout(() => { initPlayer(); }, 2000);
                                break;
                        }
                    }
                });
            } 
            // কিছু কিছু পুরোনো স্মার্ট টিভি (যেমন পুরোনো Android বা Samsung Tizen) সরাসরি m3u8 সাপোর্ট করে
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
            }
        }

        // টিভি ব্রাউজারে অনেক সময় অটো-প্লে ব্লক করে, তাই স্ক্রিনে একটা ক্লিকের পর সাউন্ড আনমিউট হবে
        video.addEventListener('play', () => {
            video.muted = false;
        });

        // প্লেয়ার চালু কর
        initPlayer();

        // এন্টি-স্টাক মেকানিজম: যদি ভিডিও ৫ সেকেন্ডের বেশি সময় ধরে 'loading' বা আটকে থাকে, জোর করে প্লে করবে
        setInterval(() => {
            if (video.paused && !video.ended) {
                video.play().catch(() => {});
            }
        }, 5000);
    </script>
</body>
</html>
