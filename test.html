<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player</title>
    <meta name="referrer" content="no-referrer-when-downgrade">
    
    <!-- HLS.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .video-container {
            width: 80%;
            max-width: 800px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

<div class="video-container">
    <video id="video" controls autoplay muted></video>
</div>

<script>
    var video = document.getElementById('video');
    var targetSrc = 'https://lalisccor.cachefly.net/laliscor/index.m3u8';
    
    // CORS Bypass করার জন্য AllOrigins প্রক্সি দিয়ে লিঙ্কটি র‍্যাপ করা হলো
    var videoSrc = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetSrc);

    if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play().catch(function(error) {
                console.log("Autoplay prevented. Click play to start.", error);
            });
        });
    }
    // Safari/iOS native m3u8 সাপোর্ট এর জন্য
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', function() {
            video.play();
        });
    }
</script>

</body>
</html>
