<!DOCTYPE html>
<html>
<head>
    <title>Iframe Data Test</title>
</head>
<body>
    <h3>Trying to read from Iframe...</h3>
    <iframe id="testFrame" src="http://202.5.56.65/CPSCR/Students/StudentReport/PrintRiportStudentProfile/15758" style="width:100%; height:300px;"></iframe>
    
    <button onclick="tryReading()">Check If I Can Read</button>
    <div id="status"></div>

    <script>
        function tryReading() {
            const frame = document.getElementById('testFrame');
            const status = document.getElementById('status');
            
            try {
                // ব্রাউজার এখানে বাধা দেবে যদি অরিজিন আলাদা হয়
                const frameDoc = frame.contentDocument || frame.contentWindow.document;
                const content = frameDoc.body.innerHTML;
                
                if (content.length > 0) {
                    status.innerHTML = "Success! Data Found. Length: " + content.length;
                    console.log("Content:", content);
                } else {
                    status.innerHTML = "Frame accessed, but no text found (because it's a PDF).";
                }
            } catch (e) {
                status.innerHTML = "Failed! Error: " + e.message;
                console.error("CORS Blocked:", e);
            }
        }
    </script>
</body>
</html>
