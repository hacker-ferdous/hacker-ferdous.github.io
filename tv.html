<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Free IPTV</title>
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js">
    </script>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --primary: #00ff88;
            --primary-glow: 0 0 15px rgba(0, 255, 136, 0.5);
            --bg: #050508;
            --sidebar-bg: rgba(12, 14, 20, 0.85);
            --card-bg: rgba(20, 23, 30, 0.8);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text: #ffffff;
            --muted: #8a8f9a;
            --hover: rgba(0, 255, 136, 0.08);
            --active-bg: rgba(0, 255, 136, 0.15);
            --header-h: 60px;
            --sidebar-w: 380px;
            --transition-speed: 0.3s;
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            background-image: radial-gradient(ellipse at 20% 20%, rgba(0, 255, 136, 0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.02) 0%, transparent 60%);
        }

        /* Modals */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-card {
            background: linear-gradient(145deg, rgba(20, 23, 32, 0.95), rgba(12, 14, 20, 0.98));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 35px 30px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
        }
        .modal-card h2 {
            font-size: 24px;
            margin-bottom: 15px;
        }
        .modal-card p {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            gap: 8px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--primary-glow);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* Inputs & Selects */
        .modal-card input,
        .modal-card select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff;
            margin: 10px 0;
            outline: none;
        }
        .modal-card select option {
            background: #141720;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        /* Topbar */
        .top-bar {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: rgba(8, 10, 16, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 110;
            flex-shrink: 0;
        }
        .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            text-shadow: var(--primary-glow);
        }
        .top-actions {
            display: flex;
            gap: 10px;
        }
        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .icon-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: var(--primary-glow);
        }

        .sidebar-toggle {
            display: none;
        }
        @media (max-width: 1024px) {
            .sidebar-toggle {
                display: flex;
            }
        }

        /* Layout */
        .app-body {
            display: flex;
            flex: 1;
            min-height: 0;
            position: relative;
        }
        .sidebar {
            width: var(--sidebar-w);
            background: var(--sidebar-bg);
            backdrop-filter: blur(24px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: 0.3s;
            flex-shrink: 0;
        }
        .player-area {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        body.fullscreen-active .sidebar {
            transform: translateX(-100%);
            opacity: 0;
        }
        body.fullscreen-active .player-area {
            width: 100vw;
            height: 100vh;
        }

        /* Mobile Sidebar */
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                top: var(--header-h);
                left: 0;
                bottom: 0;
                transform: translateX(-100%);
                width: min(85vw, 400px);
                border-radius: 0 20px 20px 0;
                box-shadow: 10px 0 40px rgba(0, 0, 0, 0.8);
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 99;
            display: none;
        }
        .sidebar-overlay.show {
            display: block;
        }

        /* Sidebar Elements */
        .search-box {
            padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
        }
        .search-box input {
            width: 100%;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff;
            outline: none;
        }
        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: var(--primary-glow);
        }

        /* Updated Tabs for 5 items */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--glass-border);
        }
        .tab-pill {
            flex: 1;
            min-width: 50px;
            padding: 8px 5px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--muted);
            transition: 0.3s;
        }
        .tab-pill.active {
            background: var(--primary);
            color: #000;
            box-shadow: var(--primary-glow);
        }

        .filter-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 10px 20px;
            border-bottom: 1px solid var(--glass-border);
        }
        .filter-select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }
        .filter-select option {
            background: #141720;
            color: #fff;
        }

        .recheck-wrap {
            padding: 8px 20px;
            border-bottom: 1px solid var(--glass-border);
        }
        .recheck-btn {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--muted);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .recheck-btn:hover {
            background: var(--primary);
            color: #000;
        }

        .check-progress {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.4);
            font-size: 12px;
            border-bottom: 1px solid var(--glass-border);
        }
        .check-progress.show {
            display: flex;
        }
        .progress-bar {
            flex: 1;
            height: 5px;
            background: #222;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: 0.3s;
        }

        .list-header {
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--muted);
            border-bottom: 1px solid var(--glass-border);
        }
        .status-stats span {
            margin-left: 8px;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }

        /* Loading Spinner */
        .main-loader {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: var(--primary);
            font-weight: 600;
            font-size: 15px;
            gap: 15px;
            text-align: center;
            animation: fadeIn 0.3s ease-in-out;
        }
        .main-loader i {
            font-size: 30px;
        }

        .channel-scroll {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 10px;
        }
        .channel-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .channel-scroll::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 3px solid transparent;
        }
        .channel-item:hover {
            background: var(--hover);
        }
        .channel-item.active {
            background: var(--active-bg);
            border-left-color: var(--primary);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .active-dot {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }
        .inactive-dot {
            background: #ff4757;
        }
        .unknown-dot {
            background: #555566;
        }
        .checking-dot {
            background: #ffd700;
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.4);
                opacity: 0.6;
            }
        }

        .channel-logo {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: #fff;
            overflow: hidden;
            flex-shrink: 0;
        }
        .channel-info {
            flex: 1;
            min-width: 0;
        }
        .channel-name {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .channel-category {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }

        .fav-btn,
        .remove-btn {
            color: #555;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
            padding: 5px;
        }
        .fav-btn:hover {
            color: #ffd700;
        }
        .fav-btn.favorited {
            color: #ffd700;
            text-shadow: 0 0 6px #ffd700;
        }
        .remove-btn:hover {
            color: #ff4757;
        }

        .added-badge {
            color: #000;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            font-weight: bold;
        }

        .app-footer {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(8, 10, 16, 0.6);
            backdrop-filter: blur(10px);
            font-size: 13px;
            color: var(--muted);
            flex-shrink: 0;
            border-top: 1px solid var(--glass-border);
        }
        .app-footer a {
            color: var(--muted);
            font-size: 18px;
            transition: 0.3s;
        }
        .app-footer a:hover {
            color: var(--primary);
            transform: translateY(-2px);
        }
        .filter-select {
        padding-right: 35px;
        appearance: none;
        background-image: url("data:image/svg+xml;charset=US-ASCII,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"/></svg>");
        background-repeat: no-repeat;
        background-position: right 15px center;
        background-size: 15px;
        }

        /* Fullscreen Mode - Overrides */
        body.fullscreen-active .top-bar,
        body.fullscreen-active .app-footer,
        body.fullscreen-active .sidebar {
            display: none !important;
        }
        
        body.fullscreen-active .app-body,
        body.fullscreen-active .player-area {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999 !important;
            background: #000 !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        body.fullscreen-active .video-js {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

    <!-- Disclaimer Alert -->
    <div id="custom-alert" class="overlay">

            <i class="fa-solid fa-circle-info" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
            <h2>Disclaimer</h2>
            <p>This is a free IPTV source. Some channels may buffer or fail due to server availability. Please be patient.</p>
            <button class="btn" onclick="document.getElementById('custom-alert').style.display='none'">I Understand</button>
        </div>
    </div>

    <!-- Add Channel / Playlist Modal -->
    <div id="add-modal" class="overlay" style="display: none;">
        <div class="modal-card">
            <h2 style="color:var(--primary);"><i class="fa-solid fa-plus-circle"></i> Add Channel/Playlist</h2>
            <select id="add-type" onchange="toggleAddType()">
                <option value="single">Single Channel Link</option>
                <option value="playlist">M3U Playlist URL</option>
            </select>
            <input type="text" id="new-channel-name" placeholder="Channel Name (Optional)" />
            <input type="text" id="new-channel-url" placeholder="Paste URL (m3u8 or m3u)" />
            <div id="add-error" style="color:#ff4757; font-size:13px; display:none; margin-top:5px;"></div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeAddModal()">Cancel</button>
                <button class="btn" id="add-submit-btn" onclick="confirmAdd()">Add to List</button>
            </div>
        </div>
    </div>

    <!-- Mobile Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Header -->
    <header class="top-bar">
        <div class="logo"><i class="fa-solid fa-satellite-dish"></i> FREE IPTV</div>
        <div class="top-actions">
            <button class="icon-btn sidebar-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-list"></i></button>
            <button class="icon-btn" onclick="document.getElementById('add-modal').style.display='flex'"><i class="fa-solid fa-plus"></i></button>
            <button class="icon-btn" onclick="togglePiP()"><i class="fa-solid fa-clone"></i></button>
            <button class="icon-btn" onclick="videoFullscreen()"><i class="fa-solid fa-expand"></i></button>
        </div>
    </header>

    <!-- Main Body -->
    <div class="app-body">
        <aside class="sidebar" id="sidebar">
            <div class="search-box">
                <input type="text" id="search" placeholder="🔍 Search channels..." oninput="handleSearch()" />
            </div>
            <div class="tabs">
                <div class="tab-pill active" onclick="setTab('all', this)">All</div>
                <div class="tab-pill" onclick="setTab('active', this)">Active</div>
                <div class="tab-pill" onclick="setTab('fav', this)">Fav</div>
                <div class="tab-pill" onclick="setTab('admin', this)">Admin</div>
                <div class="tab-pill" onclick="setTab('user', this)">Added</div>
            </div>
            <div class="filter-row">
                <select id="category-filter" class="filter-select" onchange="applyFiltersAndRender()">
                    <option value="">All Categories</option>
                </select>
                <select id="country-select" class="filter-select" onchange="changeCountry(this.value)">
                    <option value="">Loading Countries…</option>
                </select>
            </div>
            <div class="recheck-wrap">
                <button class="recheck-btn" onclick="recheckVisible()"><i class="fa-solid fa-rotate"></i> Re-Check Visible</button>
            </div>
            <div class="check-progress" id="check-progress">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <span id="progress-text">0/0</span>
                <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
                <i class="fa-solid fa-xmark cancel-check" style="cursor:pointer; color:#ff4757;" onclick="cancelRecheck()"></i>
            </div>
            <div class="list-header">
                <span id="channel-count">Total: 0</span>
                <div class="status-stats">
                    <span class="dot active-dot"></span> <span id="active-count">0</span>
                    <span class="dot inactive-dot"></span> <span id="inactive-count">0</span>
                    <span class="dot unknown-dot"></span> <span id="unknown-count">0</span>
                </div>
            </div>
            <div class="channel-scroll" id="scroll-container">
                <!-- Loading Animation Area -->
                <div id="main-loader" class="main-loader">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <div>Fetching Channels...<br><small style="font-size: 11px; color: var(--muted); font-weight: normal;">Please wait</small></div>
                </div>

                <ul id="channel-list" style="list-style:none;">
                    <li id="scroll-sentinel" style="height:10px;"></li>
                </ul>
            </div>
        </aside>

        <main class="player-area">
            <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
        </main>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
        <div>Created by <span style="color:var(--primary); font-weight:bold;">Ferdous</span></div>
        <a href="mailto:nafsin.ferdous@gmail.com"><i class="fa-solid fa-envelope"></i></a>
        <a href="https://www.facebook.com/nafsin.ferdous.5"><i class="fa-brands fa-facebook"></i></a>

        <a href="http://hacker-ferdous.github.io/"><i class="fa-brands fa-github"></i></a>
    </footer>

        // Render Chunk Size optimized to prevent browser hanging!
        const CHUNK_SIZE = 60; 
        const WORKER_COUNT = 10;

        // --- Proxy Worker Pool ---
        const workers = [],
            highPriorityQ = [], // Using Arrays as Stacks (.push and .pop) for instant performance
            lowPriorityQ = [],
            inFlight = new Set();
        let isRechecking = false,
            recheckTotal = 0,
            recheckDone = 0;

        function initWorkers() {
            // Updated timeout to 10000ms (10 seconds) for higher accuracy!
            const workerScript = `self.onmessage=async function(e){const{id,url}=e.data;try{const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),10000);const r=await fetch('https://streamflix-relay.chrizmonsaji.workers.dev?url='+encodeURIComponent(url),{signal:ctrl.signal});clearTimeout(t);self.postMessage({id,status:(r.ok||r.status<400)?'active':'inactive'});}catch{self.postMessage({id,status:'inactive'});}};`;
            const blobUrl = URL.createObjectURL(new Blob([workerScript], { type: 'application/javascript' }));

            for (let i = 0; i < WORKER_COUNT; i++) {
                const w = new Worker(blobUrl);
                w.isBusy = false;
                w.onmessage = (e) => {
                    const { id, status } = e.data;
                    channelCache[id] = status;
                    updateDot(id, status);
                    inFlight.delete(id);
                    w.isBusy = false;

                    updateStats();

                    if (isRechecking) {
                        recheckDone++;
                        const progText = document.getElementById('progress-text');
                        const progFill = document.getElementById('progress-fill');
                        if (progText) progText.textContent = `${recheckDone}/${recheckTotal}`;
                        if (progFill) progFill.style.width = `${(recheckDone / recheckTotal) * 100}%`;
                        if (recheckDone >= recheckTotal) stopRecheck();
                    } else {
                        saveCacheDebounced();
                    }
                    processWorkerQueue();
                };
                workers.push(w);
            }
        }

        function processWorkerQueue() {
            const freeWorker = workers.find(w => !w.isBusy);
            if (!freeWorker) return;

            let next = null;
            while (highPriorityQ.length || lowPriorityQ.length) {
                // Using .pop() instead of .shift() ensures O(1) speed and stops Browser from hanging
                if (highPriorityQ.length) next = highPriorityQ.pop();
                else next = lowPriorityQ.pop();

                if (next && !inFlight.has(next.id) && (!channelCache[next.id] || isRechecking)) {
                    break;
                }
                next = null;
            }

            if (next) {
                freeWorker.isBusy = true;
                inFlight.add(next.id);
                updateDot(next.id, 'checking');
                freeWorker.postMessage({ id: next.id, url: next.url });
                processWorkerQueue();
            }
        }

        const saveCacheDebounced = () => {
            clearTimeout(window.cacheTimer);
            window.cacheTimer = setTimeout(() => {

        function updateDot(id, status) {
            const items = document.querySelectorAll('.channel-item');
            for (let i = 0; i < items.length; i++) {
                if (items[i].dataset.id === id) {
                    const dot = items[i].querySelector('.status-dot');
                    if (!dot) return;
                    dot.classList.remove('active-dot', 'inactive-dot', 'unknown-dot', 'checking-dot');
                    if (status === 'active') dot.classList.add('active-dot');
                    else if (status === 'inactive') dot.classList.add('inactive-dot');
                    else if (status === 'checking') dot.classList.add('checking-dot');
                    else dot.classList.add('unknown-dot');
                    break;
                }
            }
        }

                const activeEl = document.getElementById('active-count');
                const inactiveEl = document.getElementById('inactive-count');
                const unknownEl = document.getElementById('unknown-count');
                if (activeEl) activeEl.textContent = a;
                if (inactiveEl) inactiveEl.textContent = b;
                if (unknownEl) unknownEl.textContent = u;
                const totalEl = document.getElementById('channel-count');
                if (totalEl) totalEl.textContent = `Total: ${currentViewList.length}`;
            }, 300);

        function parseM3U(data, isUserAdded) {
            const lines = data.split('\n');
            const list = [];
            let current = {};
            for (let i = 0; i < lines.length; i++) {
                const l = lines[i].trim();
                if (!l) continue;
                if (l.startsWith('#EXTINF:')) {
                    const lg = l.match(/tvg-logo="([^"]+)"/);
                    const ct = l.match(/group-title="([^"]+)"/);
                    current.logo = lg ? lg[1] : '';
                    current.category = ct ? ct[1] : 'Uncategorized';
                    current.name = l.substring(l.lastIndexOf(',') + 1).trim() || 'Unknown';
                } else if (!l.startsWith('#') && current.name) {
                    list.push({
                        id: (isUserAdded ? 'usr_' : 'ch_') + Math.random().toString(36).substr(2, 9),
                        name: current.name,
                        url: l,
                        logo: current.logo,
                        category: current.category,
                        userAdded: isUserAdded,
                        adminAdded: false
                    });
                    current = {};
                }
            }
            return list;
        }

        function mergeAndRender() {
            allChannels = [...adminChannels, ...userChannels, ...playlistChannels];

            const cats = new Set();
            allChannels.forEach(c => {
                if (c.category) c.category.split(/[;,]/).forEach(s => cats.add(s.trim()))
            });
            const catSel = document.getElementById('category-filter');
            const oldVal = catSel.value;
            catSel.innerHTML = '<option value="">All Categories</option>';
            Array.from(cats).sort().forEach(c => catSel.insertAdjacentHTML('beforeend',
                `<option value="${c}">${c}</option>`));
            if (oldVal && Array.from(cats).includes(oldVal)) catSel.value = oldVal;

            applyFiltersAndRender();
        }

        function applyFiltersAndRender() {
            document.querySelectorAll('.channel-item').forEach(el => el.remove());
            displayedCount = 0;
            selectedCategory = document.getElementById('category-filter').value;

            let src = allChannels;

            // Tab Filtering Logic
            if (currentTab === 'fav') src = src.filter(c => favoriteChannels.some(f => f.id === c.id));
            else if (currentTab === 'active') src = src.filter(c => channelCache[c.id] === 'active');
            else if (currentTab === 'admin') src = src.filter(c => c.adminAdded);
            else if (currentTab === 'user') src = src.filter(c => c.userAdded);

            // Search & Category
            const q = document.getElementById('search').value.toLowerCase().trim();
            if (q) src = src.filter(c => (c.name || '').toLowerCase().includes(q) || (c.category || '').toLowerCase().includes(q));
            if (selectedCategory) src = src.filter(c => c.category && c.category.includes(selectedCategory));

            currentViewList = src;
            document.getElementById('channel-count').textContent = `Total: ${currentViewList.length}`;
            updateStats();

            lowPriorityQ.length = 0;
            // Push items reversed into Stack so we can safely use fast `.pop()`
            for (let i = currentViewList.length - 1; i >= 0; i--) {
                lowPriorityQ.push(currentViewList[i]);
            }
            renderNextChunk();
        }

        function extractNameFromUrl(url) {
            if (!url) return 'Unknown';
            let path = url.split('?')[0];
            let parts = path.split('/').filter(Boolean);
            if (!parts.length) return 'Unknown';

            let last = parts[parts.length - 1];
            const generic = ['chunks.m3u8', 'mono.m3u8', 'mono.ts.m3u8', 'index.m3u8', 'playlist.m3u8', 'playlist540p.m3u8', 'playlist720p.m3u8'];
            if (generic.includes(last.toLowerCase()) && parts.length > 1) {
                last = parts[parts.length - 2];
            } else {
                last = last.split('.')[0];
            }
            let name = last.replace(/[-_]/g, ' ').toUpperCase();
            if (!name || name.length < 2) return 'Unknown Channel';
            return name;
        }

        function renderNextChunk() {
            const chunk = currentViewList.slice(displayedCount, displayedCount + CHUNK_SIZE);
            if (!chunk.length) return;

            const html = chunk.map(ch => {
                const status = channelCache[ch.id] || 'unknown';
                const dotClass = status + '-dot' + (inFlight.has(ch.id) ? ' checking-dot' : '');
                const isFav = favoriteChannels.some(f => f.id === ch.id);

                let displayName = ch.name && ch.name.trim() ? ch.name.trim() : extractNameFromUrl(ch.url);
                const firstChar = displayName.charAt(0).toUpperCase();

                let bgHash = 0;
                for (let i = 0; i < displayName.length; i++) bgHash = displayName.charCodeAt(i) + ((bgHash << 5) - bgHash);
                const bg = `hsl(${Math.abs(bgHash) % 360}, 70%, 45%)`;

                const logoContent = ch.logo ?
                    `<img src="${ch.logo}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'" style="width:100%;height:100%;object-fit:contain;"/><span style="display:none">${firstChar}</span>` :
                    firstChar;

                return `
                            <li class="channel-item ${ch.id === currentlyPlayingId ? 'active' : ''}" data-id="${ch.id}">
                                <span class="status-dot ${dotClass}"></span>
                                <div class="channel-logo" style="background:${bg}">${logoContent}</div>
                                <div class="channel-info">
                                    <div class="channel-name">
                                        ${displayName} 
                                        ${ch.adminAdded ? '<span class="added-badge" style="background:#00d2ff;">Admin</span>' : ''}
                                        ${ch.userAdded ? '<span class="added-badge" style="background:var(--primary);">User</span>' : ''}
                                    </div>
                                    <div class="channel-category">${ch.category || 'Uncategorized'}</div>
                                </div>
                                <i class="fa-solid fa-star fav-btn ${isFav ? 'favorited' : ''}"></i>
                                ${ch.userAdded ? `<i class="fa-solid fa-xmark remove-btn"></i>` : ''}
                            </li>
                        `;
            }).join('');

            const sentinel = document.getElementById('scroll-sentinel');
            if (sentinel) {
                sentinel.insertAdjacentHTML('beforebegin', html);
            }

            displayedCount += chunk.length;
            
            // Push items reversed so popping from stack takes elements from top order down
            for (let i = chunk.length - 1; i >= 0; i--) {
                highPriorityQ.push(chunk[i]);
            }
            processWorkerQueue();
        }

        function setupEventDelegation() {
            document.getElementById('channel-list').addEventListener('click', (e) => {
                const item = e.target.closest('.channel-item');
                if (!item) return;
                const id = item.dataset.id;

                if (e.target.closest('.fav-btn')) toggleFav(id, e.target.closest('.fav-btn'));

                else playChannel(id, item);

        function playChannel(id, element) {
            const ch = allChannels.find(c => c.id === id);
            if (!ch) return;

            document.querySelector('.channel-item.active')?.classList.remove('active');
            element.classList.add('active');
            currentlyPlayingId = id;

            updateDot(id, 'checking');
            player.src({ src: ch.url, type: 'application/x-mpegURL' });

            let resolved = false;
            player.one('playing', () => {
                resolved = true;
                channelCache[id] = 'active';
                updateDot(id, 'active');
                saveCacheDebounced();
            });
            player.one('error', () => {
                if (!resolved) {
                    channelCache[id] = 'inactive';
                    updateDot(id, 'inactive');
                    saveCacheDebounced();
                }
            });
            player.play().catch(() => {});

            if (window.innerWidth <= 1024) toggleSidebar();
        }

        function toggleFav(id, btn) {
            const ch = allChannels.find(c => c.id === id);
            const idx = favoriteChannels.findIndex(f => f.id === id);
            if (idx !== -1) {
                favoriteChannels.splice(idx, 1);
                btn.classList.remove('favorited');
            } else {
                favoriteChannels.push(ch);
                btn.classList.add('favorited');
            }
            localStorage.setItem('iptv_favorites', JSON.stringify(favoriteChannels));
            if (currentTab === 'fav') applyFiltersAndRender();
        }

            if (!confirm('Remove this channel?')) return;
            userChannels = userChannels.filter(c => c.id !== id);
            localStorage.setItem('iptv_user_channels', JSON.stringify(userChannels));
            mergeAndRender();

        async function confirmAdd() {
            const type = document.getElementById('add-type').value;
            const url = document.getElementById('new-channel-url').value.trim();
            const name = document.getElementById('new-channel-name').value.trim() || 'Custom Channel';
            const err = document.getElementById('add-error');
            const btn = document.getElementById('add-submit-btn');

            if (!url) {
                err.textContent = 'Please enter a URL.';
                err.style.display = 'block';
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            try {
                if (type === 'playlist') {
                    const text = await fetch(url).then(r => r.text());
                    const parsed = parseM3U(text, true);
                    if (!parsed.length) throw new Error("No channels found in playlist.");
                    userChannels = [...userChannels, ...parsed];
                } else {
                    userChannels.push({
                        id: 'usr_' + Date.now(),
                        name,
                        url,
                        category: 'User Added',
                        logo: '',
                        userAdded: true,
                        adminAdded: false
                    });
                }

                localStorage.setItem('iptv_user_channels', JSON.stringify(userChannels));
                closeAddModal();
                document.getElementById('new-channel-url').value = '';
                document.getElementById('new-channel-name').value = '';
                mergeAndRender();
                alert(type === 'playlist' ? 'Playlist Added Successfully!' : 'Channel Added!');
            } catch (e) {
                err.textContent = e.message || 'Failed to fetch/parse the playlist. CORS or Invalid URL.';
                err.style.display = 'block';
            }

            btn.innerHTML = 'Add to List';
            btn.disabled = false;
        }

        function recheckVisible() {
            if (!currentViewList.length) return;
            isRechecking = true;
            recheckDone = 0;
            recheckTotal = currentViewList.length;

            currentViewList.forEach(c => {
                channelCache[c.id] = 'unknown';
                updateDot(c.id, 'checking');
            });
            document.getElementById('check-progress').classList.add('show');

            highPriorityQ.length = 0;
            lowPriorityQ.length = 0;
            // Push items reversed into Stack so we can safely use fast `.pop()`
            for (let i = currentViewList.length - 1; i >= 0; i--) {
                highPriorityQ.push(currentViewList[i]);
            }
            processWorkerQueue();
        }

        function stopRecheck() {
            isRechecking = false;
            document.getElementById('check-progress').classList.remove('show');
            saveCacheDebounced();
        }

        function cancelRecheck() { stopRecheck(); }

            else document.exitFullscreen();
        }

        document.addEventListener('fullscreenchange', () => {
            document.body.classList.toggle('fullscreen-active', !!document.fullscreenElement);
        });

        async function togglePiP() {
            const vid = document.querySelector('video');
            if (document.pictureInPictureElement) await document.exitPictureInPicture();
            else if (vid && document.pictureInPictureEnabled) await vid.requestPictureInPicture();
        }

        function setupIntersectionObserver() {
            const observer = new IntersectionObserver(e => {
                if (e[0].isIntersecting && currentViewList.length > displayedCount) {
                    renderNextChunk();
                }
            }, { root: document.getElementById('scroll-container'), rootMargin: '400px' });

            const sentinel = document.getElementById('scroll-sentinel');
            if (sentinel) observer.observe(sentinel);
        }
    </script>
</body>
</html>
