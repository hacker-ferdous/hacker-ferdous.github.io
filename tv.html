<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Free IPTV</title>

    <!-- Video.js Base CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        /* =========================================
           CSS VARIABLES & RESET
           ========================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary-color: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.4);
            --bg-color: #08080a;
            --panel-bg: #121216;
            --hover-bg: #1e1e24;
            --text-main: #ffffff;
            --text-muted: #888899;
            --border-color: #22222a;
            --header-h: 68px;
            --footer-h: 82px;
            /* increased to fit stacked layout */
        }

        html,
        body {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* =========================================
           CUSTOM ALERT MODAL
           ========================================= */
        #custom-alert {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .alert-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 35px 25px;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9);
            transform: scale(1);
            transition: transform 0.4s ease;
        }

        .alert-box i {
            font-size: 50px;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .alert-box h2 {
            margin: 0 0 12px;
            color: var(--text-main);
            font-size: 24px;
            letter-spacing: 1px;
        }

        .alert-box p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .alert-box button {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .alert-box button:hover {
            box-shadow: 0 0 20px var(--primary-glow);
            transform: scale(1.05);
        }

        /* =========================================
           HEADER
           ========================================= */
        header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-color);
            height: var(--header-h);
            min-height: var(--header-h);
        }

        h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .controls-header {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .header-btn {
            background: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            white-space: nowrap;
        }

        .header-btn:hover {
            background: var(--primary-color);
            color: #000;
            border-color: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* =========================================
           MAIN CONTAINER
           ========================================= */
        .container {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: row;
            background: var(--panel-bg);
            border-radius: 0;
            overflow: hidden;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        /* --- Video Player --- */
        .video-section {
            flex: 2.5;
            background: #000;
            display: flex;
            flex-direction: column;
            position: relative;
            border-right: 1px solid var(--border-color);
            min-height: 0;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        /* --- Playlist --- */
        .playlist-section {
            flex: 1;
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            min-width: 300px;
            max-width: 450px;
            min-height: 0;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: #0d0d12;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            background: transparent;
            color: var(--text-muted);
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            background: rgba(0, 255, 136, 0.05);
        }

        .tab-btn:hover:not(.active) {
            color: #fff;
        }

        .filters {
            padding: 10px 14px;
            background: #111116;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        select,
        input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #18181f;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
            appearance: none;
        }

        select {
            cursor: pointer;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2300ff88%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        select:focus,
        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .list-header {
            padding: 6px 15px;
            background: #0d0d12;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            min-height: 38px;
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
            min-height: 0;
        }

        .channel-list::-webkit-scrollbar {
            width: 6px;
        }

        .channel-list::-webkit-scrollbar-track {
            background: #0a0a0c;
        }

        .channel-list::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .channel-list::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }

        .channel-item {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .channel-item:hover {
            background: var(--hover-bg);
        }

        .channel-item.active {
            background: rgba(0, 255, 136, 0.08);
            border-left: 4px solid var(--primary-color);
        }

        .channel-logo {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: #000;
            object-fit: contain;
            border: 1px solid #333;
            flex-shrink: 0;
        }

        .channel-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .channel-name {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-category {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fav-btn {
            color: #444;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            padding: 4px;
            flex-shrink: 0;
        }

        .fav-btn:hover {
            color: #ffd700;
            transform: scale(1.2);
        }

        .fav-btn.favorited {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .loading,
        .error-msg {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-muted);
            font-size: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .loading i {
            font-size: 30px;
            color: var(--primary-color);
        }

        #scroll-sentinel {
            height: 4px;
        }

        /* =========================================
           FOOTER — STACKED LAYOUT
           ========================================= */
        footer {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 20px;
            color: var(--text-muted);
            font-size: 14px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-color);
            height: var(--footer-h);
            min-height: var(--footer-h);
            gap: 6px;
        }

        .credits {
            font-size: 14px;
        }

        .credits span {
            color: var(--primary-color);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .social-links {
            display: flex;
            gap: 18px;
        }

        .social-links a {
            color: var(--text-muted);
            font-size: 20px;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-links a:hover {
            color: var(--primary-color);
            transform: scale(1.2) translateY(-2px);
        }

        /* =========================================
           RESPONSIVE
           ========================================= */
        @media (max-width: 900px) {
            :root {
                --header-h: 58px;
                --footer-h: 76px;
            }

            header {
                padding: 6px 14px;
            }

            h1 {
                font-size: 17px;
                gap: 6px;
            }

            .header-btn {
                padding: 6px 10px;
                font-size: 13px;
            }
            .header-btn span {
                display: none;
            }

            .container {
                flex-direction: column;
                border-radius: 0;
            }

            .video-section {
                flex: 0 0 40vh;
                min-height: 200px;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .playlist-section {
                flex: 1;
                min-height: 0;
                max-width: none;
                min-width: 0;
            }

            .tabs .tab-btn {
                padding: 10px 0;
                font-size: 13px;
            }

            .filters {
                padding: 8px 12px;
                gap: 8px;
            }

            select,
            input {
                padding: 8px 12px;
                font-size: 13px;
            }

            .list-header {
                font-size: 12px;
                min-height: 34px;
                padding: 4px 12px;
            }

            .channel-item {
                padding: 8px 12px;
                gap: 10px;
            }

            .channel-logo {
                width: 34px;
                height: 34px;
            }

            .channel-name {
                font-size: 13px;
            }

            .channel-category {
                font-size: 10px;
            }

            .fav-btn {
                font-size: 16px;
            }

            footer {
                padding: 6px 14px;
                gap: 4px;
                font-size: 13px;
            }

            .social-links a {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            :root {
                --header-h: 52px;
                --footer-h: 70px;
            }

            h1 {
                font-size: 15px;
            }
            .header-btn {
                padding: 4px 8px;
                font-size: 12px;
            }
            .video-section {
                flex: 0 0 35vh;
                min-height: 160px;
            }
            .channel-item {
                padding: 6px 10px;
                gap: 8px;
            }
            .channel-logo {
                width: 30px;
                height: 30px;
            }
            .channel-name {
                font-size: 12px;
            }
            .alert-box {
                padding: 25px 18px;
                margin: 0 16px;
            }
            .alert-box h2 {
                font-size: 20px;
            }
            .alert-box p {
                font-size: 14px;
            }
            .social-links {
                gap: 14px;
            }
            .social-links a {
                font-size: 16px;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .video-section {
                flex: 0 0 50vh;
                min-height: 140px;
            }
            .container {
                flex-direction: row;
            }
            .playlist-section {
                max-width: 40vw;
                min-width: 200px;
            }
            :root {
                --footer-h: 60px;
            }
            footer {
                padding: 4px 14px;
                gap: 2px;
            }
            .social-links a {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Custom Alert -->
    <div id="custom-alert">
        <div class="alert-box" id="alert-box-content">
            <i class="fa-solid fa-circle-info"></i>
            <h2>Disclaimer</h2>
            <p>Since this is a free IPTV source, some channels may experience buffering or might not load due to server availability or regional restrictions. Thank you for your patience.</p>
            <button onclick="closeAlert()">I Understand</button>
        </div>
    </div>

    <!-- Header -->
    <header>
        <h1><i class="fa-solid fa-tv"></i> Free IPTV</h1>
        <div class="controls-header">
            <button class="header-btn" onclick="togglePiP()" title="Picture in Picture">
                <i class="fa-solid fa-clone"></i> <span>Mini</span>
            </button>
            <button class="header-btn" onclick="videoFullscreen()" title="Fullscreen">
                <i class="fa-solid fa-expand"></i> <span>Full</span>
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container" id="app-container">

        <!-- Video Player -->
        <div class="video-section">
            <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" data-setup='{"fluid": false}'>
                <p class="vjs-no-js">Please enable JavaScript.</p>
            </video>
        </div>

        <!-- Playlist Sidebar -->
        <div class="playlist-section">

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" id="tab-all" onclick="switchTab('all')"><i class="fa-solid fa-globe"></i> All</button>
                <button class="tab-btn" id="tab-fav" onclick="switchTab('fav')"><i class="fa-solid fa-star"></i> Favorites</button>
            </div>

            <!-- Filters -->
            <div class="filters" id="filter-container">
                <select id="country-select">
                    <!-- populated by JS -->
                </select>
                <input type="text" id="search" placeholder="🔍 Search channel..." />
            </div>

            <!-- Channel Count -->
            <div class="list-header">
                <span id="channel-count"><i class="fa-solid fa-list-ol"></i> Total: 0</span>
            </div>

            <!-- Loading -->
            <div id="loading" class="loading">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
                <span>Loading playlist…</span>
            </div>

            <!-- Channel List -->
            <ul id="channel-list" class="channel-list">
                <div id="scroll-sentinel"></div>
            </ul>
        </div>
    </div>

    <!-- Footer — stacked layout -->
    <footer>
        <div class="credits">Created by <span>Ferdous</span></div>
        <div class="social-links">
            <a href="mailto:nafsin.ferdous@gmail.com" target="_blank" title="Email"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://www.facebook.com/nafsin.ferdous.5" target="_blank" title="Facebook"><i class="fa-brands fa-facebook"></i></a>
            <a href="https://www.instagram.com/n.ferdous_" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="http://hacker-ferdous.github.io/" target="_blank" title="GitHub"><i class="fa-brands fa-github"></i></a>
        </div>
    </footer>

    <!-- Video.js -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js">
    </script>

        // ---- Init ----
        window.onload = function() {
            initApp();
        };

        function initApp() {
            listElement = document.getElementById('channel-list');
            sentinel = document.getElementById('scroll-sentinel');

            const select = document.getElementById('country-select');
            countries.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.url;
                opt.text = c.name;
                select.appendChild(opt);
            });

            select.addEventListener('change', (e) => {
                if (currentTab === 'all') loadPlaylist(e.target.value);
            });
            document.getElementById('search').addEventListener('input', handleSearch);

            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && currentViewList.length > displayedCount) {
                    renderNextChunk();
                }
            }, { root: listElement, rootMargin: '80px' });
            observer.observe(sentinel);

            loadPlaylist(countries[0].url);
        }

        // ---- Load M3U ----
        async function loadPlaylist(url) {
            const loadingEl = document.getElementById('loading');
            loadingEl.style.display = 'flex';
            listElement.innerHTML = '';
            listElement.appendChild(sentinel);
            document.getElementById('channel-count').innerHTML = `<i class="fa-solid fa-list-ol"></i> Total: 0`;
            allChannels = [];

            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('Network error');
                const data = await resp.text();
                setTimeout(() => parseM3UFast(data), 30);
            } catch (err) {
                loadingEl.innerHTML =
                    '<i class="fa-solid fa-triangle-exclamation" style="color:red;"></i><span>Failed to load playlist. Check your connection or try again.</span>';
            }
        }

        function parseM3UFast(data) {
            const lines = data.split('\n');
            let current = {};
            let idCounter = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                if (line.startsWith('#EXTINF:')) {
                    let logo = 'https://via.placeholder.com/60x60/111111/00ff88?text=TV';
                    const logoIdx = line.indexOf('tvg-logo="');
                    if (logoIdx !== -1) {
                        const s = logoIdx + 10;
                        const e = line.indexOf('"', s);
                        if (e !== -1) logo = line.substring(s, e);
                    }
                    current.logo = logo;

                    let category = 'Uncategorized';
                    const catIdx = line.indexOf('group-title="');
                    if (catIdx !== -1) {
                        const s = catIdx + 13;
                        const e = line.indexOf('"', s);
                        if (e !== -1) category = line.substring(s, e);
                    }
                    current.category = category;

                    const comma = line.lastIndexOf(',');
                    current.name = comma !== -1 ? line.substring(comma + 1).trim() : 'Unknown';
                } else if (!line.startsWith('#')) {
                    if (current.name) {
                        current.url = line;
                        current.id = 'ch-' + idCounter++;
                        allChannels.push(current);
                        current = {};
                    }
                }
            }

            document.getElementById('loading').style.display = 'none';
            resetAndRender(allChannels);
        }

        // ---- Render ----
        function resetAndRender(list) {
            currentViewList = list;
            displayedCount = 0;
            document.getElementById('channel-count').innerHTML =
                `<i class="fa-solid fa-list-ol"></i> Total: ${list.length}`;
            listElement.innerHTML = '';
            listElement.appendChild(sentinel);
            renderNextChunk();
        }

        function renderNextChunk() {
            const fragment = document.createDocumentFragment();
            const chunk = currentViewList.slice(displayedCount, displayedCount + CHUNK_SIZE);

            chunk.forEach(ch => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                if (ch.id === currentlyPlayingId) li.classList.add('active');
                li.id = ch.id;

                const isFav = favoriteChannels.some(f => f.url === ch.url);

                li.innerHTML = `
                    <img src="${ch.logo}" class="channel-logo" loading="lazy" onerror="this.src='https://via.placeholder.com/60x60/111111/00ff88?text=TV'">
                    <div class="channel-info" onclick="playChannel('${ch.id}')">
                        <span class="channel-name">${ch.name}</span>
                        <span class="channel-category">${ch.category}</span>
                    </div>
                    <i class="fa-solid fa-star fav-btn ${isFav ? 'favorited' : ''}" onclick="toggleFavorite(event, '${ch.id}')" title="Favorite"></i>
                `;
                fragment.appendChild(li);
            });

            listElement.insertBefore(fragment, sentinel);
            displayedCount += CHUNK_SIZE;
        }

        // ---- Interactions ----
        window.playChannel = function(id) {
            const ch = allChannels.find(c => c.id === id) || favoriteChannels.find(c => c.id === id);
            if (!ch) return;

            if (currentlyPlayingId) {
                const old = document.getElementById(currentlyPlayingId);
                if (old) old.classList.remove('active');
            }
            const el = document.getElementById(ch.id);
            if (el) el.classList.add('active');
            currentlyPlayingId = ch.id;

            player.src({ src: ch.url, type: 'application/x-mpegURL' });
            player.play().catch(() => {});
        };

        window.toggleFavorite = function(event, id) {
            event.stopPropagation();
            const icon = event.target;
            const ch = allChannels.find(c => c.id === id) || favoriteChannels.find(c => c.id === id);
            if (!ch) return;

            const idx = favoriteChannels.findIndex(f => f.url === ch.url);
            if (idx !== -1) {
                favoriteChannels.splice(idx, 1);
                icon.classList.remove('favorited');
                if (currentTab === 'fav') resetAndRender(favoriteChannels);
            } else {
                favoriteChannels.push(ch);
                icon.classList.add('favorited');
            }
            localStorage.setItem('iptv_favorites', JSON.stringify(favoriteChannels));
        };

        // ---- Tabs ----
        window.switchTab = function(tab) {
            currentTab = tab;
            document.getElementById('tab-all').classList.toggle('active', tab === 'all');
            document.getElementById('tab-fav').classList.toggle('active', tab === 'fav');

            if (tab === 'all') {
                document.getElementById('filter-container').style.display = 'flex';
                loadPlaylist(document.getElementById('country-select').value);
            } else {
                document.getElementById('filter-container').style.display = 'none';
                document.getElementById('search').value = '';
                document.getElementById('loading').style.display = 'none';
                resetAndRender(favoriteChannels);
            }
        };

        // ---- Search ----
        function handleSearch(e) {
            const q = e.target.value.toLowerCase().trim();
            if (!q) { resetAndRender(allChannels); return; }
            const filtered = allChannels.filter(c =>
                c.name.toLowerCase().includes(q) || c.category.toLowerCase().includes(q)
            );
            resetAndRender(filtered);
        }

        // ---- Fullscreen & PiP ----
        window.videoFullscreen = function() {
            player.isFullscreen() ? player.exitFullscreen() : player.requestFullscreen();
        };

        window.togglePiP = async function() {
            const video = document.querySelector('#my-video_html5_api');
            if (!video) return;
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                } else {
                    alert('Picture-in-Picture not supported.');
                }
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
