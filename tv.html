<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        /* =========================================
           CSS VARIABLES & GLOBAL STYLES
           ========================================= */
        :root {
            --primary-color: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.4);
            --bg-color: #08080a;
            --panel-bg: #121216;
            --hover-bg: #1e1e24;
            --text-main: #ffffff;
            --text-muted: #888899;
            --border-color: #22222a;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* =========================================
           CUSTOM ALERT MODAL (Premium Design)
           ========================================= */
        #custom-alert {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .alert-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 35px 25px;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            transform: scale(1);
            transition: transform 0.4s ease;
        }

        .alert-box i {
            font-size: 50px;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .alert-box h2 {
            margin: 0 0 12px;
            color: var(--text-main);
            font-size: 24px;
            letter-spacing: 1px;
        }

        .alert-box p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .alert-box button {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .alert-box button:hover {
            box-shadow: 0 0 20px var(--primary-glow);
            transform: scale(1.05);
        }

        /* =========================================
           HEADER STYLES
           ========================================= */
        header {
            width: 98%;
            max-width: 1600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
        }

        h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .controls-header {
            display: flex;
            gap: 15px;
        }

        .header-btn {
            background: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn:hover {
            background: var(--primary-color);
            color: #000;
            border-color: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* =========================================
           MAIN LAYOUT (PLAYER + PLAYLIST)
           ========================================= */
        .container {
            display: flex;
            flex-direction: row;
            width: 98%;
            max-width: 1600px;
            height: calc(100vh - 160px);
            background: var(--panel-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
            border: 1px solid var(--border-color);
        }

        /* --- Video Player Section --- */
        .video-section {
            flex: 2.5;
            background: #000;
            display: flex;
            flex-direction: column;
            position: relative;
            border-right: 1px solid var(--border-color);
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        /* --- Playlist & Sidebar Section --- */
        .playlist-section {
            flex: 1;
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            min-width: 350px;
            max-width: 450px;
        }

        /* Custom Tabs (All vs Favorites) */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: #0d0d12;
        }
        .tab-btn {
            flex: 1;
            padding: 15px 0;
            text-align: center;
            background: transparent;
            color: var(--text-muted);
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: 0.3s;
        }
        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            background: rgba(0, 255, 136, 0.05);
        }
        .tab-btn:hover:not(.active) { color: #fff; }

        /* Search & Dropdown Filters */
        .filters {
            padding: 15px;
            background: #111116;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #18181f;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
            appearance: none;
        }
        
        select {
            cursor: pointer;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2300ff88%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        select:focus, input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* --- Channel Count Display --- */
        .list-header {
            padding: 8px 15px;
            background: #0d0d12;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- Channel List UI --- */
        .channel-list {
            overflow-y: auto;
            flex: 1;
            list-style: none;
            padding: 0;
            margin: 0;
            position: relative;
        }
        
        /* Custom Scrollbar */
        .channel-list::-webkit-scrollbar { width: 8px; }
        .channel-list::-webkit-scrollbar-track { background: #0a0a0c; }
        .channel-list::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .channel-list::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

        .channel-item {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .channel-item:hover { background: var(--hover-bg); }
        .channel-item.active {
            background: rgba(0, 255, 136, 0.08);
            border-left: 4px solid var(--primary-color);
        }

        .channel-logo {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            background: #000;
            object-fit: contain;
            border: 1px solid #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .channel-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .channel-name {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-category {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        /* Favorite Icon */
        .fav-btn {
            color: #444;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            padding: 5px;
        }
        .fav-btn:hover { color: #ffd700; transform: scale(1.2); }
        .fav-btn.favorited { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

        .loading, .error-msg {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .loading i { font-size: 30px; color: var(--primary-color); }

        /* Loader Sentinel for Infinite Scroll */
        #scroll-sentinel {
            height: 20px;
        }

        /* =========================================
           FOOTER STYLES
           ========================================= */
        footer {
            width: 98%;
            max-width: 1600px;
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 14px;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }
        .credits span {
            color: var(--primary-color);
            font-weight: bold;
            letter-spacing: 1px;
        }
        .social-links {
            display: flex;
            gap: 18px;
        }
        .social-links a {
            color: var(--text-muted);
            font-size: 18px;
            transition: 0.3s;
        }
        .social-links a:hover {
            color: var(--primary-color);
            transform: scale(1.2) translateY(-2px);
        }

        /* Responsive Design */
        @media (max-width: 1000px) {
            .container { flex-direction: column; height: calc(100vh - 120px); overflow-y: auto;}
            .video-section { flex: none; height: 45vh; border-right: none; border-bottom: 1px solid var(--border-color); }
            .playlist-section { flex: none; height: auto; min-height: 50vh; }
            header h1 { font-size: 20px; }
            .header-btn span { display: none; }
            footer { flex-direction: column; gap: 10px; padding: 15px 0; }
        }
    </style>
</head>
<body>

    <!-- Custom Alert Popup -->
    <div id="custom-alert">
        <div class="alert-box" id="alert-box-content">
            <i class="fa-solid fa-circle-info"></i>
            <h2>Disclaimer</h2>
            <p>Since this is a free IPTV source, some channels may experience buffering or might not load due to server availability or regional restrictions. Thank you for your patience.</p>
            <button onclick="closeAlert()">I Understand</button>
        </div>
    </div>

    <!-- Header Section -->
    <header>
        <h1><i class="fa-solid fa-tv"></i> Free IPTV</h1>
        <div class="controls-header">
            <button class="header-btn" onclick="togglePiP()" title="Picture in Picture">
                <i class="fa-solid fa-clone"></i> <span>Mini Player</span>
            </button>
            <button class="header-btn" onclick="videoFullscreen()" title="Fullscreen Video">
                <i class="fa-solid fa-expand"></i> <span>Full Screen</span>
            </button>
        </div>
    </header>

    <!-- Main App Container -->
    <div class="container" id="app-container">
        
        <!-- Video Player -->
        <div class="video-section">
            <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" data-setup='{"fluid": false}'>
                <p class="vjs-no-js">To view this video please enable JavaScript.</p>
            </video>
        </div>

        <!-- Sidebar / Playlist -->
        <div class="playlist-section">
            
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" id="tab-all" onclick="switchTab('all')"><i class="fa-solid fa-globe"></i> All Channels</button>
                <button class="tab-btn" id="tab-fav" onclick="switchTab('fav')"><i class="fa-solid fa-star"></i> Favorites</button>
            </div>

            <!-- Filters (Dropdown & Search) -->
            <div class="filters" id="filter-container">
                <select id="country-select">
                    <!-- Javascript will populate 190+ countries here -->
                </select>
                <input type="text" id="search" placeholder="🔍 Search for a channel...">
            </div>

            <!-- Total Channel Count Display -->
            <div class="list-header">
                <span id="channel-count"><i class="fa-solid fa-list-ol"></i> Total Channels: 0</span>
            </div>

            <!-- Channel Status / List -->
            <div id="loading" class="loading">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
                <span>Downloading Database...</span>
            </div>
            
            <ul id="channel-list" class="channel-list">
                <!-- Channels rendered via JS -->
                <div id="scroll-sentinel"></div>
            </ul>
        </div>
    </div>

    <!-- Footer Section -->
    <footer>
        <div class="credits">Created by <span>Ferdous</span></div>
        <div class="social-links">
            <a href="mailto:nafsin.ferdous@gmail.com" target="_blank" title="Email"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://www.facebook.com/nafsin.ferdous.5" target="_blank" title="Facebook"><i class="fa-brands fa-facebook"></i></a>

            <a href="http://hacker-ferdous.github.io/" target="_blank" title="GitHub"><i class="fa-brands fa-github"></i></a>
        </div>
    </footer>

        // --- Initialization ---
        window.onload = function() {
            // Initiate App immediately in the background
            initApp();
        };

        // Function to close custom alert
        function closeAlert() {
            const alertModal = document.getElementById('custom-alert');
            const alertBox = document.getElementById('alert-box-content');
            
            alertBox.style.transform = "scale(0.8)";
            alertModal.style.opacity = "0";
            
            setTimeout(() => {
                alertModal.style.display = "none";
            }, 400);
        }

        function initApp() {
            // Setup DOM references
            listElement = document.getElementById('channel-list');
            sentinel = document.getElementById('scroll-sentinel');

            // Populate Dropdown
            const select = document.getElementById('country-select');
            countries.forEach((country) => {
                const option = document.createElement('option');
                option.value = country.url;
                option.text = country.name;
                select.appendChild(option);
            });

            // Event Listeners
            select.addEventListener('change', (e) => {
                if(currentTab === 'all') loadPlaylist(e.target.value);
            });
            document.getElementById('search').addEventListener('input', handleSearch);

            // Infinite Scroll setup
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && currentViewList.length > displayedCount) {
                    renderNextChunk();
                }
            }, { root: listElement, rootMargin: '100px' });
            observer.observe(sentinel);

            // Start by loading default global list
            loadPlaylist(countries[0].url);
        }

        // --- Fetch and Parse M3U ---
        async function loadPlaylist(url) {
            document.getElementById('loading').style.display = 'flex';
            listElement.innerHTML = '';
            listElement.appendChild(sentinel);
            document.getElementById('channel-count').innerHTML = `<i class="fa-solid fa-list-ol"></i> Total Channels: 0`;
            allChannels = [];

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Network error");
                const data = await response.text();
                
                // Allow UI to breathe
                setTimeout(() => {
                    parseM3UFast(data);
                }, 50);
            } catch (error) {
                document.getElementById('loading').innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="color:red;"></i><span>Failed to load playlist. Link might be blocked by CORS or Dead.</span>';
            }
        }

        // Extremely fast parser designed for 30,000+ lines
        function parseM3UFast(data) {
            const lines = data.split('\n');
            let currentChannel = {};
            let idCounter = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                if (line.startsWith('#EXTINF:')) {
                    // Extract Logo
                    let logo = 'https://via.placeholder.com/60x60/111111/00ff88?text=TV';
                    const logoStartIdx = line.indexOf('tvg-logo="');
                    if (logoStartIdx !== -1) {
                        const start = logoStartIdx + 10;
                        const end = line.indexOf('"', start);
                        if (end !== -1) logo = line.substring(start, end);
                    }
                    currentChannel.logo = logo;

                    // Extract Category (Group Title)
                    let category = 'Uncategorized';
                    const catStartIdx = line.indexOf('group-title="');
                    if (catStartIdx !== -1) {
                        const start = catStartIdx + 13;
                        const end = line.indexOf('"', start);
                        if (end !== -1) category = line.substring(start, end);
                    }
                    currentChannel.category = category;
                    
                    // Extract Name
                    const commaIdx = line.lastIndexOf(',');
                    if (commaIdx !== -1) {
                        currentChannel.name = line.substring(commaIdx + 1).trim() || 'Unknown Channel';
                    } else {
                        currentChannel.name = 'Unknown Channel';
                    }
                } else if (!line.startsWith('#')) {
                    if (currentChannel.name) {
                        currentChannel.url = line;
                        currentChannel.id = 'channel-' + idCounter++;
                        allChannels.push(currentChannel);
                        currentChannel = {}; 
                    }
                }
            }

            document.getElementById('loading').style.display = 'none';
            resetAndRender(allChannels); 
        }

        // --- Rendering Engine (Infinite Scroll) ---
        function resetAndRender(list) {
            currentViewList = list;
            displayedCount = 0;
            
            // Update Channel Count text dynamically
            document.getElementById('channel-count').innerHTML = `<i class="fa-solid fa-list-ol"></i> Total Channels: ${list.length}`;
            
            // Clear existing list except the sentinel
            listElement.innerHTML = '';
            listElement.appendChild(sentinel);
            renderNextChunk();
        }

        function renderNextChunk() {
            const fragment = document.createDocumentFragment();
            const chunk = currentViewList.slice(displayedCount, displayedCount + CHUNK_SIZE);
            
            chunk.forEach(channel => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                if (channel.id === currentlyPlayingId) li.classList.add('active');
                li.id = channel.id;

                // Favorite Logic
                const isFav = favoriteChannels.some(fav => fav.url === channel.url);

                // Build HTML safely
                li.innerHTML = `
                    <img src="${channel.logo}" class="channel-logo" loading="lazy" onerror="this.src='https://via.placeholder.com/60x60/111111/00ff88?text=TV'">
                    <div class="channel-info" onclick="playChannel('${channel.id}')">
                        <span class="channel-name">${channel.name}</span>
                        <span class="channel-category">${channel.category}</span>
                    </div>
                    <i class="fa-solid fa-star fav-btn ${isFav ? 'favorited' : ''}" onclick="toggleFavorite(event, '${channel.id}')" title="Add to Favorites"></i>
                `;
                fragment.appendChild(li);
            });

            // Insert before the sentinel
            listElement.insertBefore(fragment, sentinel);
            displayedCount += CHUNK_SIZE;
        }

        // --- Channel Interactions ---
        window.playChannel = function(id) {
            const channel = allChannels.find(c => c.id === id) || favoriteChannels.find(c => c.id === id);
            if(!channel) return;

            if (currentlyPlayingId) {
                const oldEl = document.getElementById(currentlyPlayingId);
                if(oldEl) oldEl.classList.remove('active');
            }

            const newEl = document.getElementById(channel.id);
            if(newEl) newEl.classList.add('active');
            currentlyPlayingId = channel.id;

            player.src({ src: channel.url, type: 'application/x-mpegURL' });
            player.play().catch(e => console.log("Autoplay blocked by browser."));
        };

        window.toggleFavorite = function(event, id) {
            event.stopPropagation(); // Prevent playing channel
            
            const icon = event.target;
            const channel = allChannels.find(c => c.id === id) || favoriteChannels.find(c => c.id === id);
            if(!channel) return;

            const existingIndex = favoriteChannels.findIndex(fav => fav.url === channel.url);
            
            if(existingIndex !== -1) {
                // Remove from favorites
                favoriteChannels.splice(existingIndex, 1);
                icon.classList.remove('favorited');
                if(currentTab === 'fav') resetAndRender(favoriteChannels); // Update view instantly if in fav tab
            } else {
                // Add to favorites
                favoriteChannels.push(channel);
                icon.classList.add('favorited');
            }

            localStorage.setItem('iptv_favorites', JSON.stringify(favoriteChannels));
        };

        // --- Tab Switching (All vs Favorites) ---
        window.switchTab = function(tab) {
            currentTab = tab;
            document.getElementById('tab-all').classList.remove('active');
            document.getElementById('tab-fav').classList.remove('active');
            
            if(tab === 'all') {
                document.getElementById('tab-all').classList.add('active');
                document.getElementById('filter-container').style.display = 'flex';
                // Trigger current dropdown to load
                loadPlaylist(document.getElementById('country-select').value);
            } else {
                document.getElementById('tab-fav').classList.add('active');
                document.getElementById('filter-container').style.display = 'none';
                document.getElementById('search').value = '';
                document.getElementById('loading').style.display = 'none';
                resetAndRender(favoriteChannels);
            }
        };

        // --- Search ---
        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            if (query.trim() === "") {
                resetAndRender(allChannels);
                return;
            }
            const filtered = allChannels.filter(c => c.name.toLowerCase().includes(query) || c.category.toLowerCase().includes(query));
            resetAndRender(filtered);
        }

        // --- Extra Features (Fullscreen & PiP) ---

        // 1. Video Only Fullscreen
        window.videoFullscreen = function() {
            if (player.isFullscreen()) {
                player.exitFullscreen();
            } else {
                player.requestFullscreen();
            }
        };

        // 2. Picture-in-Picture Mode (Mini Player)
        window.togglePiP = async function() {
            const videoEl = document.querySelector('#my-video_html5_api');
            if (!videoEl) return;

            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else if (document.pictureInPictureEnabled) {
                    await videoEl.requestPictureInPicture();
                } else {
                    alert("Your browser does not support Picture-in-Picture.");
                }
            } catch (error) {
                console.error("PiP Error:", error);
            }
        };
    </script>
</body>
</html>
